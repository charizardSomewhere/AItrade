<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signal Badge Target Reference</title>
    <!-- We use the Tailwind CDN so it looks exactly like your Next.js app! -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #0a0a0f;
            /* App dark background */
            font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            padding: 40px;
            display: flex;
            justify-content: center;
        }

        /* The custom glow effect from our app */
        .glow-green {
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.15);
        }

        /* The pulsing dot animation */
        @keyframes customPulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: .5;
            }
        }

        .pulse-live {
            animation: customPulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
    </style>
</head>

<body>

    <!-- Target width container -->
    <div style="width: 280px;">

        <p class="text-slate-400 text-sm mb-4 text-center">This is your target design to recreate!</p>

        <!-- Here is the translated Raw HTML from SignalBadge.tsx -->
        <div
            class="bg-gradient-to-br from-emerald-500/20 to-emerald-500/5 border border-emerald-500/40 glow-green rounded-xl p-4 flex flex-col gap-3">

            <!-- Ticker + price -->
            <div class="flex items-baseline justify-between">
                <div>
                    <span class="text-xs text-slate-500 tracking-widest uppercase">Analyzing</span>
                    <h2 class="text-2xl font-bold tracking-tight text-slate-100">NVDA</h2>
                </div>
                <div class="text-right">
                    <p class="text-sm text-slate-400 font-mono">$850.20</p>
                    <p class="text-[10px] text-slate-600">Last price</p>
                </div>
            </div>

            <!-- Signal -->
            <div class="flex items-center gap-3">
                <span class="text-4xl font-black tracking-tighter text-emerald-400">BUY</span>
                <div class="flex flex-col">
                    <span class="text-xs text-slate-500">Confidence</span>
                    <div class="flex items-center gap-2">
                        <div class="w-24 h-1.5 bg-[#1e1e2e] rounded-full overflow-hidden">
                            <!-- Progress Bar fill -->
                            <div class="h-full rounded-full text-emerald-400 bg-current transition-all"
                                style="width: 85%; opacity: 0.8"></div>
                        </div>
                        <span class="text-sm font-mono font-bold text-emerald-400">85%</span>
                    </div>
                </div>
            </div>

            <!-- Sentiment row -->
            <div class="grid grid-cols-2 gap-2 text-center">
                <div class="bg-[#0d0d14]/60 rounded-lg p-2">
                    <p class="text-[10px] text-slate-500 mb-0.5">Sentiment</p>
                    <p class="text-xs font-semibold text-emerald-400">Positive</p>
                </div>
                <div class="bg-[#0d0d14]/60 rounded-lg p-2">
                    <p class="text-[10px] text-slate-500 mb-0.5">Score</p>
                    <p class="text-xs font-mono font-semibold text-slate-200">+0.85</p>
                </div>
            </div>

            <!-- Scheduler note -->
            <div class="flex items-center justify-between text-[10px] text-slate-600 border-t border-[#1e1e2e] pt-2">
                <span>⏱ Updates every 15 min via Alpha Vantage</span>
                <span class="flex items-center gap-1">
                    <span class="w-1.5 h-1.5 rounded-full bg-emerald-400 pulse-live"></span>
                    LIVE
                </span>
            </div>

        </div>

    </div>

</body>

</html>
